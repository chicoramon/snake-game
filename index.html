<!DOCTYPE html>
<html lang="en">
<head>

<title>Snake</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --accent: #4ecca3;
    --accent-dim: rgba(78,204,163,0.6);
    --accent-glow: rgba(78,204,163,0.25);
    --accent-glow-soft: rgba(78,204,163,0.08);
    --accent-glow-mid: rgba(78,204,163,0.15);
    --food: #ff6b6b;
    --food-glow: rgba(255,107,107,0.5);
    --food-accent: #ffaa44;
    --death: #ff3333;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    height: 100%;
    overflow: hidden;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    color: #e0e0e0;
    padding: 0 env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #score-bar {
    position: fixed;
    top: 0;
    left: 0; right: 0;
    padding: max(env(safe-area-inset-top), 12px) 20px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 10;
    font-size: 1.1rem;
    font-weight: 600;
  }
  #score-bar .label { color: #888; }
  #score-bar .val { color: var(--accent); font-variant-numeric: tabular-nums; }
  #timer-block { display: none; }
  #timer-block.visible { display: block; }
  #timer.urgent {
    color: #ff5a5a;
    animation: timer-pulse 0.6s steps(2, end) infinite;
  }
  @keyframes timer-pulse { 50% { opacity: 0.45; } }
  @media (prefers-reduced-motion: reduce) { #timer.urgent { animation: none; } }
  #pause-btn {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--accent);
    font-size: 1.1rem;
    padding: 6px 14px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
  }
  #pause-btn:active { background: var(--accent-glow-mid); transform: scale(0.9); }
  #pause-btn.paused { background: var(--accent-glow-mid); border-color: var(--accent-glow); }
  canvas {
    display: block;
    image-rendering: pixelated;
    outline: 2px solid var(--accent-glow);
    outline-offset: -1px;
    box-shadow: inset 0 0 30px var(--accent-glow-soft), 0 0 20px var(--accent-glow);
    border-radius: 4px;
  }
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 20;
    transition: opacity 0.2s;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    touch-action: auto;
  }
  #overlay .ov-content {
    margin: auto 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay h2 { font-size: 2rem; color: var(--accent); margin-bottom: 8px; }
  #overlay .theme-label {
    color: var(--accent-dim);
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 2px;
    margin: -2px 0 12px;
    text-transform: uppercase;
  }
  #overlay p { font-size: 1.1rem; margin-bottom: 24px; color: #aaa; }
  #overlay button {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 14px 40px;
    font-size: 1.1rem;
    font-weight: 700;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #overlay button:active { transform: scale(0.95); }
  .game-mode-toggle {
    display: flex;
    gap: 8px;
    margin: 0 0 14px;
  }
  #overlay .game-mode-btn {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.14);
    color: #aaa;
    font-family: inherit;
    font-size: 0.78rem;
    padding: 7px 14px;
    border-radius: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: none;
  }
  #overlay .game-mode-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    box-shadow: 0 0 14px var(--accent-glow);
  }
  #countdownDisplay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 15;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-size: clamp(5rem, 25vw, 9rem);
    font-weight: 900;
    text-shadow: 0 0 28px var(--accent-glow);
    pointer-events: none;
  }
  #countdownDisplay.visible { display: flex; }
  #shareBtn, #lbBtn {
    display: none;
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 12px 36px;
    font-size: 1rem;
    font-weight: 700;
    border-radius: 14px;
    cursor: pointer;
    margin-top: 12px;
    transition: transform 0.1s, background 0.2s;
  }
  #shareBtn:hover, #lbBtn:hover { background: var(--accent-glow-mid); }
  #shareBtn:active, #lbBtn:active { transform: scale(0.95); }
  #namePrompt {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
  }
  #namePrompt .np-label {
    color: var(--accent-dim);
    font-size: 0.85rem;
    letter-spacing: 2px;
  }
  #scoreMethodLabel {
    color: var(--accent-dim);
    font-size: 0.68rem;
    letter-spacing: 1px;
    text-align: center;
    text-transform: uppercase;
  }
  #scoreMethodLabel.unranked { color: #ff8b8b; }
  #nameInput {
    background: rgba(255,255,255,0.06);
    border: 2px solid var(--accent-dim);
    color: var(--accent);
    font-family: inherit;
    font-size: 1.4rem;
    font-weight: 700;
    text-align: center;
    text-transform: uppercase;
    width: 100px;
    padding: 8px;
    border-radius: 8px;
    letter-spacing: 10px;
    outline: none;
  }
  #nameInput::placeholder { color: rgba(78,204,163,0.25); letter-spacing: 10px; }
  #nameInput:focus { border-color: var(--accent); }
  #submitScoreBtn {
    background: var(--accent);
    color: #000;
    border: none;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    padding: 8px 24px;
    cursor: pointer;
    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: transform 0.1s;
  }
  #submitScoreBtn:active { transform: scale(0.95); }
  #submitScoreBtn:disabled { opacity: 0.3; cursor: default; }
  #leaderboardOverlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #000;
    z-index: 100;
    flex-direction: column;
    align-items: center;
    padding: 50px 16px 30px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #leaderboardOverlay.visible { display: flex; }
  #leaderboardOverlay h2 {
    color: var(--accent);
    font-size: 1.1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .lb-filter-group {
    width: 100%;
    max-width: 520px;
    margin-bottom: 12px;
  }
  .lb-filter-label {
    display: block;
    color: #aaa;
    font-size: 0.62rem;
    letter-spacing: 2px;
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .lb-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 0;
  }
  .lb-filter {
    background: none;
    border: 1.5px solid rgba(255,255,255,0.1);
    color: #aaa;
    font-family: inherit;
    font-size: 0.75rem;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .lb-filter.active {
    background: var(--accent-glow-mid);
    border-color: var(--accent);
    color: #fff;
  }
  .lb-table {
    width: 100%;
    max-width: 420px;
    border-collapse: collapse;
  }
  .lb-table th {
    color: #aaa;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--accent-glow-mid);
    text-align: left;
  }
  .lb-table td {
    color: #ccc;
    font-size: 0.9rem;
    padding: 6px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .lb-table tr.top1 td { color: #ffd700; font-weight: 700; }
  .lb-table tr.top2 td { color: #c0c0c0; font-weight: 700; }
  .lb-table tr.top3 td { color: #cd7f32; font-weight: 700; }
  .lb-table .lb-rank { width: 32px; text-align: center; color: #aaa; }
  .lb-table .lb-score { text-align: right; font-variant-numeric: tabular-nums; }
  .lb-table .lb-theme-col { color: #999; font-size: 0.7rem; }
  .lb-method-tag {
    display: inline-block;
    margin-left: 7px;
    color: #aaa;
    font-size: 0.58rem;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    vertical-align: 1px;
  }
  .lb-table tr.you td { background: var(--accent-glow-soft); }
  .lb-pagination {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 14px;
    width: 100%;
    max-width: 420px;
    margin-top: 16px;
  }
  .lb-page-btn {
    min-width: 76px;
    background: transparent;
    border: 1.5px solid var(--accent-dim);
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.72rem;
    padding: 7px 10px;
    text-transform: uppercase;
  }
  .lb-page-btn:disabled { opacity: 0.3; cursor: default; }
  #lbPageInfo {
    color: #aaa;
    font-size: 0.7rem;
    min-width: 100px;
    text-align: center;
  }
  #lbBack {
    margin-top: 18px;
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    padding: 10px 32px;
    cursor: pointer;
    border-radius: 14px;
    transition: transform 0.1s, background 0.2s;
  }
  #lbBack:hover { background: var(--accent-glow-mid); }
  #lbBack:active { transform: scale(0.95); }
  #lbLoading {
    color: #aaa;
    font-size: 0.9rem;
    margin: 30px 0;
  }
  #lbEmpty {
    color: #aaa;
    font-size: 0.9rem;
    margin: 30px 0;
    display: none;
  }
  #mute-btn {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: var(--accent);
    font-size: 1.1rem;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 8px;
  }
  #mute-btn:active { background: rgba(255,255,255,0.12); }
  #mute-btn.muted { color: #555; border-color: rgba(255,255,255,0.06); }
  #fps-counter {
    display: none;
    position: fixed;
    top: max(env(safe-area-inset-top), 8px);
    left: 12px;
    background: rgba(0,0,0,0.35);
    color: var(--accent-dim);
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 6px;
    z-index: 25;
    pointer-events: none;
    letter-spacing: 0.5px;
    font-variant-numeric: tabular-nums;
  }
  body.debug #fps-counter { display: block; }
  #dpad {
    position: fixed;
    bottom: max(env(safe-area-inset-bottom), 24px);
    right: max(env(safe-area-inset-right), 16px);
    width: 168px;
    height: 168px;
    z-index: 15;
    pointer-events: none;
    opacity: 0.52;
    transition: opacity 0.3s;
  }
  #dpad.active { opacity: 1; }
  #dpad .btn {
    position: absolute;
    width: 56px;
    height: 56px;
    background: rgba(255,255,255,0.11);
    border: 1.5px solid rgba(255,255,255,0.22);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: background 0.08s, transform 0.08s, box-shadow 0.08s;
    user-select: none;
    -webkit-user-select: none;
  }
  #dpad .btn svg {
    width: 24px;
    height: 24px;
    fill: none;
    stroke: rgba(255,255,255,0.72);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  #dpad .btn:active, #dpad .btn.pressed {
    background: var(--accent-glow-mid);
    border-color: var(--accent-glow);
    box-shadow: 0 0 20px var(--accent-glow), inset 0 0 10px var(--accent-glow-soft);
    transform: scale(0.9);
  }
  #dpad .btn:active svg, #dpad .btn.pressed svg {
    stroke: var(--accent);
  }
  #dpad .btn.up    { top: 0;   left: 56px; }
  #dpad .btn.left  { top: 56px; left: 0; }
  #dpad .btn.right { top: 56px; right: 0; }
  #dpad .btn.down  { top: 112px; left: 56px; }

  /* Options Menu */
  #options-btn {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: #888;
    font-size: 1.3rem;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 8px;
  }
  #options-btn:active { background: rgba(255,255,255,0.12); }
  #options-panel {
    display: none;
    position: fixed;
    inset: 0;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    z-index: 30;
    padding: 20px;
  }
  #options-panel.visible { display: flex; }
  #options-panel h2 { font-size: 1.6rem; color: var(--accent); margin-bottom: 24px; }
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 340px;
  }
  .theme-btn {
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .theme-btn:active { transform: scale(0.95); }
  .theme-btn.selected {
    border-color: var(--accent);
    background: var(--accent-glow-soft);
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .theme-btn .theme-icon { display:flex; align-items:center; justify-content:center; width:48px; height:48px; }
  .theme-btn .theme-icon svg, .theme-btn .theme-icon canvas { width:100%; height:100%; image-rendering: pixelated; }
  .icon { width:1em; height:1em; vertical-align:middle; display:inline-block; }
  .icon svg { width:100%; height:100%; display:block; }
  .theme-btn .theme-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: #aaa;
    text-align: center;
  }
  .theme-btn.selected .theme-name { color: var(--accent); }
  #options-back {
    margin-top: 24px;
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 12px 36px;
    font-size: 1rem;
    font-weight: 700;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
  }
  #options-back:active { transform: scale(0.95); background: var(--accent-glow-mid); }

  /* Controls Edit Mode */
  #controls-btn {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: #888;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 10px 20px;
    margin-top: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  #controls-btn:active { background: rgba(255,255,255,0.12); }
  #controls-edit-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 40;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  #controls-edit-overlay.visible { display: flex; flex-direction: column; align-items: center; }
  #controls-edit-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: max(env(safe-area-inset-top), 16px) 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,0,0,0.6);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    z-index: 41;
  }
  #controls-edit-bar .edit-hint {
    font-size: 0.85rem;
    color: #aaa;
    font-weight: 500;
  }
  #controls-edit-bar .edit-hint .accent { color: var(--accent); }
  #controls-reset-btn, #controls-done-btn {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    color: #ccc;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 8px 16px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #controls-done-btn {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  #controls-reset-btn:active, #controls-done-btn:active { transform: scale(0.95); }
  #dpad.edit-mode { pointer-events: auto; opacity: 1 !important; z-index: 50 !important; }
  #dpad.edit-mode .btn {
    pointer-events: auto;
    opacity: 0.85;
    background: rgba(78,204,163,0.12);
    border: 2px dashed var(--accent);
    cursor: grab;
    z-index: 50;
  }
  #dpad.edit-mode .btn:active { cursor: grabbing; }
  #dpad.edit-mode .btn.dragging {
    opacity: 1;
    background: rgba(78,204,163,0.25);
    box-shadow: 0 0 20px var(--accent-glow);
  }
  #dpad.edit-mode .drag-handle { display: none; }

  /* Turn Controls edit-mode */
  #turn-controls.edit-mode { pointer-events: auto; opacity: 1 !important; z-index: 50 !important; }
  #turn-controls.edit-mode .turn-btn {

    cursor: grab;
    z-index: 50;
  }

    box-shadow: 0 0 20px var(--accent-glow);

    touch-action: manipulation;

    user-select: none;
    -webkit-user-select: none;

  #turn-controls .turn-btn svg {
    width: 32px;
    height: 32px;
    fill: none;
    stroke: rgba(255,255,255,0.72);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;

    background: var(--accent-glow-mid);
    border-color: var(--accent-glow);
    box-shadow: 0 0 20px var(--accent-glow), inset 0 0 10px var(--accent-glow-soft);
    transform: scale(0.9);

  #turn-controls .turn-btn:active svg, #turn-controls .turn-btn.pressed svg {

    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    box-shadow: none;
    text-shadow: none;
  }
  #overlay .control-mode-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
    box-shadow: 0 0 14px var(--accent-glow);
    text-shadow: none;
  }
  @media (hover: hover) and (pointer: fine) {
    #dpad:not(.edit-mode), #turn-controls:not(.edit-mode) { display: none !important; }
  }

const canvasH = ROWS * CELL;

function getViewportHeight() {
  const vp = window.visualViewport;
  return vp ? vp.height : window.innerHeight;
}

function getViewportWidth() {
  const vp = window.visualViewport;
  return vp ? vp.width : window.innerWidth;
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const barH = document.getElementById('score-bar').offsetHeight;
  const vpHeight = getViewportHeight();
  const vpWidth = getViewportWidth();
  // Account for body safe-area padding (side padding for landscape notches)

function registerControlMethod(method) {
  if (!alive || countdownActive) return;
  if (!runControlMethod) runControlMethod = method;
  else if (runControlMethod !== method) runUsesMixedControls = true;
}

function applyTheme(id) {
  currentTheme = id;
  localStorage.setItem('snakeTheme', id);
  const t = THEMES[id];
  const r = document.documentElement.style;
  r.setProperty('--accent', t.accent);
  // Derive accent variations
  const a = t.accent;
  r.setProperty('--accent-dim', a + '99');
  r.setProperty('--accent-glow', a + '40');
  r.setProperty('--accent-glow-soft', a + '14');
  r.setProperty('--accent-glow-mid', a + '26');
  r.setProperty('--food', t.food);
  r.setProperty('--food-glow', t.foodGlow);
  r.setProperty('--food-accent', t.foodAccent);
  r.setProperty('--death', t.deathFlash + 'ff)');
  // Update theme color meta
  document.querySelector('meta[name="theme-color"]').content = t.bg;
  // Update selected state in options
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.theme === id);
  });
  themeLabel.textContent = t.name + ' Theme';
}

// Initialize theme
applyTheme(currentTheme);

function formatSprintTime(ms) {
  const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
  return `${Math.floor(totalSeconds / 60)}:${String(totalSeconds % 60).padStart(2, '0')}`;
}

function updateSprintTimer(force = false) {
  const second = Math.max(0, Math.ceil(sprintRemainingMs / 1000));
  if (!force && second === lastTimerSecond) return;
  lastTimerSecond = second;
  timerEl.textContent = formatSprintTime(sprintRemainingMs);
  timerEl.classList.toggle('urgent', second > 0 && second <= 10);
}

function applyGameMode(mode) {
  gameMode = mode;
  localStorage.setItem('snake_game_mode', mode);
  best = bestScores[mode];
  bestEl.textContent = best;
  document.querySelectorAll('.game-mode-btn').forEach(btn => {
    const selected = btn.dataset.gameMode === mode;
    btn.classList.toggle('active', selected);
    btn.setAttribute('aria-pressed', String(selected));
  });
}

document.querySelectorAll('.game-mode-btn').forEach(btn => {
  btn.addEventListener('click', () => applyGameMode(btn.dataset.gameMode));
});
applyGameMode(gameMode);

function reset(startingRun = false) {
  const cx = Math.floor(COLS / 2);
  const cy = Math.floor(ROWS / 2);
  snake = [{x: cx, y: cy}, {x: cx-1, y: cy}, {x: cx-2, y: cy}];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  speed = BASE_INTERVAL;
  alive = startingRun;
  paused = false;
  tickAccum = 0;
  sprintRemainingMs = SPRINT_DURATION_MS;
  lastTimerSecond = 60;
  countdownActive = startingRun && runGameMode === 'sprint';
  countdownRemainingMs = countdownActive ? SPRINT_COUNTDOWN_MS : 0;
  countdownDisplay.textContent = countdownActive ? '3' : '';
  countdownDisplay.classList.toggle('visible', countdownActive);
  timerBlock.classList.toggle('visible', startingRun && runGameMode === 'sprint');
  updateSprintTimer(true);
  scoreEl.textContent = 0;
  // Clear effects
  particles.length = 0;
  deathSegments.length = 0;
  trailPoints.length = 0;
  screenShake = 0; shakeX = 0; shakeY = 0;
  deathFlash = 0;
  foodScale = 1; foodScaleTarget = 1;
  // Reset pause button
  const pauseBtn = document.getElementById('pause-btn');
  pauseBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 10 10" shape-rendering="crispEdges" fill="currentColor"><rect x="2" y="1" width="2" height="8"/><rect x="6" y="1" width="2" height="8"/></svg>';
  pauseBtn.classList.remove('paused');
  pauseBtn.setAttribute('aria-label', 'Pause game');
  pauseBtn.title = 'Pause (P)';
  // Keep the game identity primary; the selected theme has its own label.
  overlayTitle.textContent = 'SNAKE';
  themeLabel.textContent = THEMES[currentTheme].name + ' Theme';
  overlayMsg.textContent = 'Ready to play?';
  placeFood();
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS)};
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

// --- Particle System (from game-engine: object pooling for perf) ---
const particles = [];
const MAX_PARTICLES = 200;

function spawnParticles(x, y, count, color, speedMul, lifeMul) {
  for (let i = 0; i < count; i++) {
    if (particles.length >= MAX_PARTICLES) {
      // Reuse oldest dead particle
      const dead = particles.findIndex(p => p.life <= 0);
      if (dead === -1) break;
      particles.splice(dead, 1);
    }
    const angle = Math.random() * Math.PI * 2;
    const speed = (1 + Math.random() * 3) * speedMul;
    const life = (0.3 + Math.random() * 0.5) * lifeMul;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life, maxLife: life,
      color,
      size: 2 + Math.random() * 3
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96; // drag
    p.vy *= 0.96;
    p.life -= dt / 1000;
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Death explosion: scatter snake segments ---
let deathSegments = [];

function spawnDeathExplosion() {
  const T = THEMES[currentTheme];
  const tail = T.snakeTail;
  deathSegments = [];
  for (let i = 0; i < snake.length; i++) {
    const seg = snake[i];
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    const ratio = i / Math.max(snake.length, 1);
    const r = Math.round(tail[0] + (tail[0] * 0.4) * (1 - ratio));
    const g = Math.round(tail[1] - tail[1] * 0.3 * ratio);
    const b = Math.round(tail[2] - tail[2] * 0.25 * ratio);
    deathSegments.push({
      x: seg.x * CELL + CELL / 2,
      y: seg.y * CELL + CELL / 2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: i === 0 ? CELL * 0.8 : CELL * 0.6,
      color: `rgb(${r},${g},${b})`,
      life: 1.0,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3
    });
  }
  // Also spawn particles from each segment
  for (const seg of snake) {
    spawnParticles(
      seg.x * CELL + CELL / 2,
      seg.y * CELL + CELL / 2,
      3, T.deathParticle, 1.5, 0.8
    );
  }
}

function updateDeathSegments(dt) {
  for (let i = deathSegments.length - 1; i >= 0; i--) {
    const s = deathSegments[i];
    s.x += s.vx;
    s.y += s.vy;
    s.vx *= 0.95;
    s.vy *= 0.95;
    s.rotation += s.rotSpeed;
    s.life -= dt / 1000;
    if (s.life <= 0) deathSegments.splice(i, 1);
  }
}

function drawDeathSegments() {
  for (const s of deathSegments) {
    const alpha = Math.max(0, s.life);
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rotation);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = s.color;
    ctx.fillRect(-s.size / 2, -s.size / 2, s.size, s.size);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawFoodSprite(ctx, cx, cy, cellSize, theme, scale, themeName) {
  const data = FOOD_SPRITES[themeName] || FOOD_SPRITES.default;
  const sprite = data.grid, palette = data.palette;
  const rows = sprite.length, cols = sprite[0].length;
  const pxSize = (cellSize * scale * 0.9) / rows;
  const totalW = cols * pxSize, totalH = rows * pxSize;
  const ox = cx - totalW / 2, oy = cy - totalH / 2;
  ctx.imageSmoothingEnabled = false;
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const v = sprite[row][col];
      if (v === 0) continue;
      ctx.fillStyle = palette[v];
      ctx.fillRect(Math.round(ox + col * pxSize), Math.round(oy + row * pxSize),
                   Math.ceil(pxSize), Math.ceil(pxSize));
    }
  }
}

function draw(interp) {
  const T = THEMES[currentTheme];
  // Background
  ctx.fillStyle = T.bg;
  ctx.fillRect(0, 0, canvasW, canvasH);

  // Grid
  ctx.strokeStyle = T.grid;
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvasH); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvasW, y * CELL); ctx.stroke();
  }

  // Interpolated snake position
  const drawSnake = prevSnake && prevSnake.length === snake.length && interp < 1;
  const t = drawSnake ? Math.min(interp, 1) : 1;

  // --- Snake trail (fading afterimage) ---
  for (let i = 0; i < trailPoints.length; i++) {
    const tr = trailPoints[i];
    const alpha = tr.alpha * 0.6;
    if (alpha < 0.02) continue;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = T.trail;
    ctx.beginPath();
    ctx.arc(tr.x, tr.y, CELL / 2 - 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Snake body with gradient + glow on head
  for (let i = snake.length - 1; i >= 0; i--) {
    const seg = snake[i];
    const prev = drawSnake && prevSnake[i] ? prevSnake[i] : seg;
    const px = lerp(prev.x, seg.x, t) * CELL;
    const py = lerp(prev.y, seg.y, t) * CELL;

    const ratio = i / Math.max(snake.length, 1);
    const tail = T.snakeTail;
    const r = Math.round(tail[0] + (tail[0] * 0.4) * (1 - ratio));
    const g = Math.round(tail[1] - tail[1] * 0.3 * ratio);
    const b = Math.round(tail[2] - tail[2] * 0.25 * ratio);

    // Head glow
    if (i === 0) {
      ctx.shadowColor = T.snakeHead;
      ctx.shadowBlur = 12 + Math.sin(foodPulse * 2) * 3;
    }
    ctx.fillStyle = `rgb(${r},${g},${b})`;

    const pad = i === 0 ? 1 : 2;
    const radius = i === 0 ? 6 : 3;
    roundRect(px + pad, py + pad, CELL - pad * 2, CELL - pad * 2, radius);
    ctx.shadowBlur = 0;
  }

  // Eyes on head
  const hSeg = snake[0];
  const hPrev = drawSnake && prevSnake[0] ? prevSnake[0] : hSeg;
  const hx = lerp(hPrev.x, hSeg.x, t) * CELL;
  const hy = lerp(hPrev.y, hSeg.y, t) * CELL;
  ctx.fillStyle = '#fff';
  const eyeOff1 = dir.x === 0 ? {x: 5, y: dir.y > 0 ? 12 : 5} : {x: dir.x > 0 ? 12 : 5, y: 5};
  const eyeOff2 = dir.x === 0 ? {x: 13, y: dir.y > 0 ? 12 : 5} : {x: dir.x > 0 ? 12 : 5, y: 13};
  ctx.beginPath(); ctx.arc(hx + eyeOff1.x, hy + eyeOff1.y, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(hx + eyeOff2.x, hy + eyeOff2.y, 2.5, 0, Math.PI * 2); ctx.fill();

  // Food with pulsing glow + scale punch
  foodPulse += 0.05;
  foodScale = lerp(foodScale, foodScaleTarget, 0.2);
  if (Math.abs(foodScale - foodScaleTarget) < 0.01) foodScaleTarget = 1;
  const glow = 8 + Math.sin(foodPulse) * 4;
  const foodR = (CELL / 2 - 2) * foodScale;
  ctx.shadowColor = T.food;
  ctx.shadowBlur = glow;
  ctx.fillStyle = T.food;
  ctx.beginPath();
  ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, foodR, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Food sprite (pixel art)
  drawFoodSprite(ctx, food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL, T, foodScale, currentTheme);

  // --- Particles & death segments ---
  drawParticles();
  drawDeathSegments();

  // Death flash
  if (deathFlash > 0) {
    ctx.fillStyle = T.deathFlash + deathFlash + ')';
    ctx.fillRect(0, 0, canvasW, canvasH);
    deathFlash -= 0.04;
  }

  // Pause text
  if (paused && alive) {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, canvasW, canvasH);
    ctx.fillStyle = T.accent;
    ctx.font = 'bold 32px -apple-system, SF Pro Display';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('PAUSED', canvasW / 2, canvasH / 2);
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.fill();
}

// --- Game logic ---
function gameTick() {
  if (!alive || paused) return;
  dir = nextDir;
  prevSnake = snake.map(s => ({...s}));

  // Record trail point at head position before moving
  const oldHead = snake[0];
  trailPoints.unshift({ x: oldHead.x * CELL + CELL / 2, y: oldHead.y * CELL + CELL / 2, alpha: 1 });
  if (trailPoints.length > MAX_TRAIL) trailPoints.pop();
  // Fade all trail points
  for (const tr of trailPoints) tr.alpha *= 0.7;

  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall wrap disabled — die on wall
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return die();
  if (snake.some(s => s.x === head.x && s.y === head.y)) return die();

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    haptic('eat');
    AudioEngine.sfxEat();
    AudioEngine.updateTempo(snake.length);
    const T = THEMES[currentTheme];
    // Particle burst on eat
    spawnParticles(
      food.x * CELL + CELL / 2,
      food.y * CELL + CELL / 2,
      12, T.food, 2, 1
    );
    // Also spawn accent particles
    spawnParticles(
      food.x * CELL + CELL / 2,
      food.y * CELL + CELL / 2,
      6, T.foodAccent, 1.5, 0.7
    );
    // Food scale punch
    foodScaleTarget = 1.6;
    foodScale = 0.3;
    if (score > best) {
      best = score;
      bestScores[runGameMode] = best;
      bestEl.textContent = best;
      localStorage.setItem(BEST_KEYS[runGameMode], best);
    }
    placeFood();
    speed = Math.max(MIN_INTERVAL, BASE_INTERVAL - score * 2);
  } else {
    snake.pop();
  }
}

function showRunResult(reason) {
  const isSprint = runGameMode === 'sprint';
  overlayTitle.innerHTML = reason === 'time'
    ? 'TIME UP!'
    : '<svg width="20" height="20" viewBox="0 0 10 10" shape-rendering="crispEdges" fill="#ff003c"><rect x="2" y="1" width="6" height="2"/><rect x="1" y="3" width="8" height="2"/><rect x="1" y="5" width="2" height="2"/><rect x="7" y="5" width="2" height="2"/><rect x="3" y="5" width="4" height="2" fill="rgba(0,0,0,0.3)"/><rect x="2" y="7" width="2" height="2"/><rect x="6" y="7" width="2" height="2"/><rect x="3" y="9" width="4" height="1"/></svg> Game Over';
  overlayMsg.textContent = `${isSprint ? 'Sprint ' : ''}Score: ${score}`;
  startBtn.textContent = 'Play Again';
  shareBtn.style.display = 'block';
  lbBtn.style.display = 'block';
  namePrompt.style.setProperty('display', 'flex', 'important');
  nameInput.value = '';
  const scoreMethod = runControlMethod || controlMode;
  scoreMethodLabel.textContent = runUsesMixedControls
    ? 'Mixed controls — this run is unranked'
    : `${runGameMode === 'sprint' ? 'SPRINT' : 'CLASSIC'} • ${CONTROL_LABELS[scoreMethod]} leaderboard`;
  scoreMethodLabel.classList.toggle('unranked', runUsesMixedControls);
  submitScoreBtn.textContent = runUsesMixedControls ? 'Unranked' : 'Submit';
  submitScoreBtn.disabled = true;
  nameInput.disabled = runUsesMixedControls;
  overlay.classList.remove('hidden');
}

function finishRun(reason) {
  if (!alive) return;
  alive = false;
  countdownActive = false;
  countdownDisplay.classList.remove('visible');
  haptic('die');
  AudioEngine.stop();
  if (reason === 'collision') {
    deathFlash = 0.5;
    screenShake = 15;
    AudioEngine.sfxDie();
    spawnDeathExplosion();
    spawnParticles(
      snake[0].x * CELL + CELL / 2,
      snake[0].y * CELL + CELL / 2,
      30, THEMES[currentTheme].deathParticle, 3, 1.5
    );
    trailPoints = [];
  } else {
    sprintRemainingMs = 0;
    updateSprintTimer(true);
  }
  setTimeout(() => showRunResult(reason), reason === 'collision' ? 600 : 250);
}

function die() {
  finishRun('collision');
}

function startGame() {
  if (animationFrameId !== null) cancelAnimationFrame(animationFrameId);
  overlay.classList.add('hidden');
  shareBtn.style.display = 'none';
  lbBtn.style.display = 'none';
  namePrompt.style.display = 'none';
  submittedThisRound = false;
  runControlMethod = null;
  runUsesMixedControls = false;
  nameInput.disabled = false;
  scoreMethodLabel.classList.remove('unranked');
  runGameMode = gameMode;
  best = bestScores[runGameMode];
  bestEl.textContent = best;
  reset(true);
  AudioEngine.start();
  prevSnake = null;
  lastTick = performance.now();
  animationFrameId = requestAnimationFrame(loop);
}

function setDir(x, y) {
  if (countdownActive) return;
  if (dir.x === -x && dir.y === -y) return;
  nextDir = {x, y};
}

function turnClockwise() {
  const dirMap = {up:[0,-1], right:[1,0], down:[0,1], left:[-1,0]};
  let curDirName = Object.keys(dirMap).find(k => dirMap[k][0] === dir.x && dirMap[k][1] === dir.y) || 'right';
  let idx = TURN_ORDER.indexOf(curDirName);
  let next = TURN_ORDER[(idx + 1) % 4];
  setDir(...dirMap[next]);
}

function turnCounterClockwise() {
  const dirMap = {up:[0,-1], right:[1,0], down:[0,1], left:[-1,0]};
  let curDirName = Object.keys(dirMap).find(k => dirMap[k][0] === dir.x && dirMap[k][1] === dir.y) || 'right';
  let idx = TURN_ORDER.indexOf(curDirName);
  let next = TURN_ORDER[(idx + 3) % 4]; // -1 mod 4 = 3
  setDir(...dirMap[next]);
}

// --- Main loop — requestAnimationFrame for 120Hz ProMotion ---
function loop(now) {
  const hasEffects = deathFlash > 0 || deathSegments.length > 0 || particles.length > 0;
  if (!alive && !hasEffects) {
    animationFrameId = null;
    return;
  }
  // Avoid catch-up bursts after throttled/backgrounded animation frames.
  const rawDt = Math.max(0, now - lastTick);
  const dt = Math.min(rawDt, 100);
  lastTick = now;

  if (alive && !paused) {
    if (countdownActive) {
      countdownRemainingMs -= rawDt;
      if (countdownRemainingMs <= 0) {
        countdownActive = false;
        countdownRemainingMs = 0;
        countdownDisplay.textContent = 'GO!';
        tickAccum = 0;
        setTimeout(() => countdownDisplay.classList.remove('visible'), 350);
      } else {
        const countdownLabel = String(Math.ceil(countdownRemainingMs / 1000));
        if (countdownDisplay.textContent !== countdownLabel) countdownDisplay.textContent = countdownLabel;
      }
    } else {
      if (runGameMode === 'sprint') {
        sprintRemainingMs -= rawDt;
        updateSprintTimer();
        if (sprintRemainingMs <= 0) finishRun('time');
      }
      if (alive) {
        tickAccum += dt;
        while (alive && tickAccum >= speed) {
          prevSnake = snake.map(s => ({...s}));
          gameTick();
          tickAccum -= speed;
        }
      }
    }
  }

  // Update effects
  updateParticles(dt);
  updateDeathSegments(dt);

  // Screen shake
  if (screenShake > 0) {
    shakeX = (Math.random() - 0.5) * screenShake * 1.2;
    shakeY = (Math.random() - 0.5) * screenShake * 1.2;
    screenShake *= 0.85;
    if (screenShake < 0.5) { screenShake = 0; shakeX = 0; shakeY = 0; }
  }

  const interp = alive && !paused ? tickAccum / speed : 1;

  // Apply screen shake transform
  if (screenShake > 0) {
    ctx.save();
    ctx.translate(shakeX, shakeY);
  }
  draw(interp);
  if (screenShake > 0) {
    ctx.restore();
  }

  // FPS counter
  fpsFrames++;
  const fpsNow = performance.now();
  if (fpsNow - fpsLast >= 500) {
    fpsDisplay = Math.round(fpsFrames / ((fpsNow - fpsLast) / 1000));
    fpsFrames = 0;
    fpsLast = fpsNow;
    document.getElementById('fps-counter').textContent = fpsDisplay + ' FPS';
  }

  animationFrameId = requestAnimationFrame(loop);
}

// --- Keyboard ---
document.addEventListener('keydown', e => {
  // Don't hijack keys when user is typing in an input
  if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
  switch (e.key) {

    case 'ArrowRight': case 'd': case 'D':
      e.preventDefault();
      registerControlMethod('keyboard');
      if (controlMode === 'turn') { turnClockwise(); } else { setDir(1, 0); }
      break;
    case 'ArrowLeft': case 'a': case 'A':
      e.preventDefault();
      registerControlMethod('keyboard');
      if (controlMode === 'turn') { turnCounterClockwise(); } else { setDir(-1, 0); }
      break;
    case 'ArrowUp': case 'w': case 'W':
      e.preventDefault();
      if (controlMode !== 'turn') { registerControlMethod('keyboard'); setDir(0, -1); }
      break;
    case 'ArrowDown': case 's': case 'S':
      e.preventDefault();
      if (controlMode !== 'turn') { registerControlMethod('keyboard'); setDir(0, 1); }
      break;
    case 'p': case 'P':
      togglePause();
      break;
  }
});

// --- Pause toggle ---
function setPaused(value) {
  if (!alive) return;
  if (paused === value) return;
  paused = value;
  const btn = document.getElementById('pause-btn');
  btn.innerHTML = paused
    ? '<svg width="18" height="18" viewBox="0 0 10 10" shape-rendering="crispEdges" fill="currentColor"><polygon points="2,1 8,5 2,9"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 10 10" shape-rendering="crispEdges" fill="currentColor"><rect x="2" y="1" width="2" height="8"/><rect x="6" y="1" width="2" height="8"/></svg>';
  btn.classList.toggle('paused', paused);
  btn.setAttribute('aria-label', paused ? 'Resume game' : 'Pause game');
  btn.title = paused ? 'Resume (P)' : 'Pause (P)';
  paused ? AudioEngine.pause() : AudioEngine.resume();
  if (countdownActive) {
    countdownDisplay.textContent = paused ? 'PAUSED' : String(Math.max(1, Math.ceil(countdownRemainingMs / 1000)));
  }
  if (paused) draw(1);
}
function togglePause() { setPaused(!paused); }

// --- Touch swipe (full canvas) ---
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
}, {passive: false});
canvas.addEventListener('touchmove', e => e.preventDefault(), {passive: false});
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  const minSwipe = 15;
  touchStart = null;
  if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;
  if (controlMode === 'turn') {
    registerControlMethod('turn');
    const clockwise = Math.abs(dx) > Math.abs(dy) ? dx > 0 : dy > 0;
    clockwise ? turnClockwise() : turnCounterClockwise();
  } else {
    registerControlMethod('dpad');
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
    else setDir(0, dy > 0 ? 1 : -1);
  }
});

// ============================================================
// 8-BIT CHIPTUNE ENGINE  —  Theme-aware, adaptive to snake length
// ============================================================
const AudioEngine = (() => {
  let actx, master, musicGain, sfxGain;
  let running = false, muted = false;
  let step = 0, curBPM = 120;
  let stepAccum = 0, lastStepTime = 0;
  let seqRafId = null;

  function getTheme() { return THEMES[currentTheme].music; }

  function init() {
    if (actx) return;
    actx = new (window.AudioContext || window.webkitAudioContext)();
    master = actx.createGain();
    master.gain.value = 0.35;
    master.connect(actx.destination);
    musicGain = actx.createGain(); musicGain.gain.value = 1; musicGain.connect(master);
    sfxGain  = actx.createGain(); sfxGain.gain.value  = 1; sfxGain.connect(master);
  }

  function getIntensity(len) {
    if (len < 6)  return 0;
    if (len < 12) return 1;
    if (len < 20) return 2;
    return 3;
  }

  function playNote(freq, duration, type, gainNode, vol) {
    if (!freq || freq === 0) return;
    const t = actx.currentTime;
    const osc = actx.createOscillator();
    const g   = actx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(g); g.connect(gainNode);
    osc.start(t); osc.stop(t + duration);
  }

  function playKick() {
    const t = actx.currentTime;
    const osc = actx.createOscillator();
    const g = actx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
    g.gain.setValueAtTime(0.6, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.connect(g); g.connect(musicGain);
    osc.start(t); osc.stop(t + 0.15);
  }

  function playHihat() {
    const t = actx.currentTime;
    const bufLen = actx.sampleRate * 0.04;
    const buf = actx.createBuffer(1, bufLen, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / bufLen);
    const src = actx.createBufferSource(); src.buffer = buf;
    const hp = actx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 8000;
    const g = actx.createGain(); g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    src.connect(hp); hp.connect(g); g.connect(musicGain);
    src.start(t);
  }

  function playSnare() {
    const t = actx.currentTime;
    // noise part
    const bufLen = actx.sampleRate * 0.08;
    const buf = actx.createBuffer(1, bufLen, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / bufLen);
    const src = actx.createBufferSource(); src.buffer = buf;
    const bp = actx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 3000;
    const g1 = actx.createGain(); g1.gain.setValueAtTime(0.3, t); g1.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    src.connect(bp); bp.connect(g1); g1.connect(musicGain);
    src.start(t);
    // tone part
    const osc = actx.createOscillator(); const g2 = actx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(200, t); osc.frequency.exponentialRampToValueAtTime(80, t + 0.06);
    g2.gain.setValueAtTime(0.25, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    osc.connect(g2); g2.connect(musicGain);
    osc.start(t); osc.stop(t + 0.08);
  }

  function sequencer() {
    const intensity = getIntensity(snake ? snake.length : 3);
    const m = getTheme();
    const bLen = m.bass[intensity][step % m.melody[0].length];
    const mLen = m.melody[intensity][step % m.melody[0].length];
    const aLen = m.arpeggio[intensity][step % m.melody[0].length];
    const dVal = m.drums[intensity][step % m.melody[0].length];

    const beatDur = 60 / curBPM / 4;  // 16th note

    if (bLen) playNote(bLen, beatDur * 2.5, m.bassType, musicGain, m.bassVol);
    if (mLen) playNote(mLen, beatDur * 2, m.melodyType, musicGain, m.melodyVol);
    if (aLen) playNote(aLen, beatDur * 1.5, m.arpType, musicGain, m.arpVol);
    if (dVal === 1) playKick();
    else if (dVal === 2) playHihat();
    else if (dVal === 3) playSnare();

    step++;
  }

  // rAF-based sequencer timer — survives page backgrounding unlike setInterval
  function sequencerTick(now) {
    seqRafId = null;
    if (!running) return;
    if (!lastStepTime) lastStepTime = now;
    const rawDt = now - lastStepTime;
    lastStepTime = now;
    // Cap to avoid burst catch-up after long background
    const dt = Math.min(rawDt, 200);
    stepAccum += dt;
    const stepInterval = 60000 / curBPM / 4;
    let stepsThisFrame = 0;
    while (stepAccum >= stepInterval && stepsThisFrame < 4) {
      sequencer();
      stepAccum -= stepInterval;
      stepsThisFrame++;
    }
    if (stepAccum > stepInterval * 4) stepAccum = 0;
    seqRafId = requestAnimationFrame(sequencerTick);
  }

  function startSeqTimer() {
    if (seqRafId) return;
    lastStepTime = 0;
    stepAccum = 0;
    seqRafId = requestAnimationFrame(sequencerTick);
  }

  function stopSeqTimer() {
    if (seqRafId) { cancelAnimationFrame(seqRafId); seqRafId = null; }
    lastStepTime = 0;
    stepAccum = 0;
  }

  function updateTempo(len) {
    const m = getTheme();
    curBPM = Math.min(m.maxBPM, m.baseBPM + len * m.bpmPerLen);
  }

  function start() {
    init();
    if (actx.state === 'suspended') actx.resume();
    step = 0; running = true;
    const m = getTheme();
    curBPM = m.baseBPM;
    startSeqTimer();
  }

  function stop() {
    running = false;
    stopSeqTimer();
  }

  function pause()  { stopSeqTimer(); }
  function resume() { if (running) startSeqTimer(); }

  // Resume AudioContext from background (user gesture needed on iOS)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && actx && actx.state === 'suspended') actx.resume();
  });
  window.addEventListener('pageshow', () => { if (actx && actx.state === 'suspended') actx.resume(); });
  document.addEventListener('pointerdown', () => { if (actx && actx.state === 'suspended') actx.resume(); }, { passive: true });

  function toggleMute() {
    muted = !muted;
    if (master) master.gain.value = muted ? 0 : 0.35;
    return muted;
  }

  // --- SFX ---
  function sfxEat() {
    init();
    const T = THEMES[currentTheme];
    for (const sfx of T.sfxEat) {
      const t = actx.currentTime;
      const osc = actx.createOscillator(); const g = actx.createGain();
      osc.type = sfx.type;
      for (let i = 0; i < sfx.freqs.length; i++) {
        if (i === 0) osc.frequency.setValueAtTime(sfx.freqs[i], t + (sfx.times[i] || 0));
        else osc.frequency.setValueAtTime(sfx.freqs[i], t + sfx.times[i]);
      }
      g.gain.setValueAtTime(sfx.vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + sfx.dur);
      osc.connect(g); g.connect(sfxGain);
      osc.start(t); osc.stop(t + sfx.dur);
    }
  }

  function sfxDie() {
    init();
    const T = THEMES[currentTheme].sfxDie;
    const t = actx.currentTime;
    const osc = actx.createOscillator(); const g = actx.createGain();
    osc.type = T.type;
    osc.frequency.setValueAtTime(T.freqStart, t);
    osc.frequency.exponentialRampToValueAtTime(T.freqEnd, t + T.dur);
    g.gain.setValueAtTime(T.vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + T.dur);
    osc.connect(g); g.connect(sfxGain);
    osc.start(t); osc.stop(t + T.dur);
  }

  return { start, stop, pause, resume, updateTempo, sfxEat, sfxDie, toggleMute, get muted() { return muted; } };
})();

    if (turnControls.classList.contains('edit-mode')) return;

  try {
    const saved = JSON.parse(localStorage.getItem('snake_dpad_' + dir));
    if (saved) {
      // New format: {x, y}
      if (typeof saved.x === 'number' && typeof saved.y === 'number') return saved;
      // Legacy format: {bottom, right} → ignore (incompatible)
    }
  } catch(e) {}

  const btn = dpad.querySelector('.btn.' + dir);

  btn._offsetY = 0;
  localStorage.removeItem('snake_dpad_' + dir);

// --- Controls Customization ---
const controlsBtn = document.getElementById('controls-btn');
const controlsOverlay = document.getElementById('controls-edit-overlay');
const controlsDoneBtn = document.getElementById('controls-done-btn');
const controlsResetBtn = document.getElementById('controls-reset-btn');

let draggingBtn = null;
let dragStartX, dragStartY, dragStartBtnOffsetX, dragStartBtnOffsetY;

function getViewportBounds() {
  const vp = window.visualViewport;
  return {
    w: vp ? vp.width : window.innerWidth,
    h: vp ? vp.height : window.innerHeight
  };
}

// --- Turn Controls position (localStorage) ---
const TURN_BTNS = ['ccw', 'cw'];

function loadTurnBtnPos(id) {
  try {
    const saved = JSON.parse(localStorage.getItem('snake_turn_' + id));
    if (saved && typeof saved.x === 'number' && typeof saved.y === 'number') return saved;
  } catch(e) {}
  return null;
}
function saveTurnBtnPos(id, pos) {
  localStorage.setItem('snake_turn_' + id, JSON.stringify(pos));
}
function applyTurnBtnPos(id, pos) {
  const btn = turnControls.querySelector('.turn-btn[data-turn="' + id + '"]');
  if (!btn) return;
  btn.style.transform = `translate(${pos.x}px, ${pos.y}px)`;
  btn._offsetX = pos.x;
  btn._offsetY = pos.y;
}
function resetTurnBtnPos(id) {
  const btn = turnControls.querySelector('.turn-btn[data-turn="' + id + '"]');
  if (!btn) return;
  btn.style.transform = '';
  btn._offsetX = 0;
  btn._offsetY = 0;
  localStorage.removeItem('snake_turn_' + id);
}

// Load saved turn positions
TURN_BTNS.forEach(id => {
  const saved = loadTurnBtnPos(id);
  if (saved) applyTurnBtnPos(id, saved);
});

function startControlsEdit() {
  controlsOverlay.classList.add('visible');
  overlay.style.display = 'none';
  if (controlMode === 'turn') {
    turnControls.classList.add('edit-mode');
    document.querySelector('#controls-edit-bar .edit-hint').innerHTML = 'Drag each <span class="accent">button</span>';
  } else {
    dpad.classList.add('edit-mode');
    document.querySelector('#controls-edit-bar .edit-hint').innerHTML = 'Drag each <span class="accent">button</span>';
  }
}

function stopControlsEdit() {
  dpad.classList.remove('edit-mode');
  turnControls.classList.remove('edit-mode');
  controlsOverlay.classList.remove('visible');
  overlay.style.display = '';
  // Save dpad offsets
  DPAD_BTNS.forEach(dir => {
    const btn = dpad.querySelector('.btn.' + dir);
    if (!btn) return;
    const ox = btn._offsetX || 0;
    const oy = btn._offsetY || 0;
    if (ox !== 0 || oy !== 0) saveBtnPos(dir, { x: ox, y: oy });
  });
  // Save turn offsets
  TURN_BTNS.forEach(id => {
    const btn = turnControls.querySelector('.turn-btn[data-turn="' + id + '"]');
    if (!btn) return;
    const ox = btn._offsetX || 0;
    const oy = btn._offsetY || 0;
    if (ox !== 0 || oy !== 0) saveTurnBtnPos(id, { x: ox, y: oy });
  });
}

controlsBtn.addEventListener('click', startControlsEdit);
controlsDoneBtn.addEventListener('click', stopControlsEdit);

controlsResetBtn.addEventListener('click', () => {
  if (controlMode === 'turn') {
    TURN_BTNS.forEach(id => resetTurnBtnPos(id));
  } else {
    DPAD_BTNS.forEach(dir => resetBtnPos(dir));
  }
});

function onBtnDragStart(e) {
  const parent = e.currentTarget.closest('#dpad, #turn-controls');
  if (!parent || !parent.classList.contains('edit-mode')) return;
  e.preventDefault();
  e.stopPropagation();
  draggingBtn = e.currentTarget;
  draggingBtn.classList.add('dragging');
  const touch = e.touches ? e.touches[0] : e;
  dragStartX = touch.clientX;
  dragStartY = touch.clientY;
  const parentRect = parent.getBoundingClientRect();
  const btnRect = draggingBtn.getBoundingClientRect();
  dragStartBtnOffsetX = (btnRect.left + btnRect.width / 2) - (parentRect.left + parentRect.width / 2);
  dragStartBtnOffsetY = (btnRect.top + btnRect.height / 2) - (parentRect.top + parentRect.height / 2);
}

function onBtnDragMove(e) {
  if (!draggingBtn) return;
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;
  const dx = touch.clientX - dragStartX;
  const dy = touch.clientY - dragStartY;
  let newOffsetX = dragStartBtnOffsetX + dx;
  let newOffsetY = dragStartBtnOffsetY + dy;
  const parent = draggingBtn.closest('#dpad, #turn-controls');
  const parentRect = parent.getBoundingClientRect();
  const bounds = getViewportBounds();
  const btnCenterX = parentRect.left + parentRect.width / 2 + newOffsetX;
  const btnCenterY = parentRect.top + parentRect.height / 2 + newOffsetY;
  if (btnCenterX < 28) newOffsetX -= btnCenterX - 28;
  if (btnCenterX > bounds.w - 28) newOffsetX -= btnCenterX - (bounds.w - 28);
  if (btnCenterY < 28) newOffsetY -= btnCenterY - 28;
  if (btnCenterY > bounds.h - 28) newOffsetY -= btnCenterY - (bounds.h - 28);
  draggingBtn.style.transform = `translate(${newOffsetX}px, ${newOffsetY}px)`;
  draggingBtn._offsetX = newOffsetX;
  draggingBtn._offsetY = newOffsetY;
}

function onBtnDragEnd() {
  if (!draggingBtn) return;
  draggingBtn.classList.remove('dragging');
  draggingBtn = null;
}

// Attach drag to dpad buttons
document.querySelectorAll('#dpad .btn').forEach(btn => {
  btn.addEventListener('touchstart', onBtnDragStart, { passive: false });
  btn.addEventListener('mousedown', onBtnDragStart);
});
// Attach drag to turn buttons
document.querySelectorAll('#turn-controls .turn-btn').forEach(btn => {
  btn.addEventListener('touchstart', onBtnDragStart, { passive: false });
  btn.addEventListener('mousedown', onBtnDragStart);
});
document.addEventListener('touchmove', onBtnDragMove, { passive: false });
document.addEventListener('touchend', onBtnDragEnd);
document.addEventListener('mousemove', onBtnDragMove);
document.addEventListener('mouseup', onBtnDragEnd);

// --- PWA Setup (single-file) ---
(function setupPWA() {
  // Generate SVG icon as data URI for manifest
  const iconSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10" shape-rendering="crispEdges">
    <rect width="10" height="10" fill="#000"/>
    <g fill="#4ecca3"><rect x="3" y="0" width="2" height="2"/><rect x="5" y="0" width="2" height="2"/><rect x="1" y="2" width="2" height="2"/><rect x="3" y="2" width="2" height="2"/><rect x="1" y="4" width="2" height="2"/><rect x="3" y="4" width="2" height="2"/><rect x="5" y="4" width="2" height="2"/><rect x="7" y="4" width="2" height="2"/><rect x="3" y="6" width="2" height="2"/><rect x="5" y="6" width="2" height="2"/><rect x="7" y="6" width="2" height="2"/><rect x="1" y="8" width="2" height="2"/><rect x="3" y="8" width="2" height="2"/><rect x="5" y="8" width="2" height="2"/><rect x="7" y="8" width="2" height="2"/></g>
    <rect x="3" y="2" width="2" height="2" fill="#0aff00"/><rect x="5" y="2" width="2" height="2" fill="#6b4226"/>
  </svg>`;
  const iconBlob = new Blob([iconSVG], { type: 'image/svg+xml' });
  const iconURL = URL.createObjectURL(iconBlob);

  // Web App Manifest
  const manifest = {
    name: 'Snake — 8-bit Chiptune',
    short_name: 'Snake',
    description: 'Classic snake game with adaptive chiptune soundtrack',
    start_url: location.href.split('?')[0],
    display: 'fullscreen',
    orientation: 'portrait',
    background_color: '#000000',
    theme_color: '#000000',
    icons: [{ src: iconURL, sizes: 'any', type: 'image/svg+xml', purpose: 'any maskable' }]
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const manifestURL = URL.createObjectURL(manifestBlob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = manifestURL;
  document.head.appendChild(link);

  // Service Worker (caches this page for offline play)
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'snake-v1';
      self.addEventListener('install', e => {
        e.waitUntil(
          caches.open(CACHE).then(c => c.addAll([self.registration.scope]))
        );
        self.skipWaiting();
      });
      self.addEventListener('activate', e => {
        e.waitUntil(
          caches.keys().then(ks => Promise.all(
            ks.filter(k => k !== CACHE).map(k => caches.delete(k))
          ))
        );
        self.clients.claim();
      });
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request).then(res => {
            const cl = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, cl));
            return res;
          }).catch(() => caches.match(self.registration.scope)))
        );
      });
    `;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swURL = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swURL, { scope: location.pathname }).catch(() => {});
  }
})();

async function submitScore() {
  if (!sb || submittedThisRound || runUsesMixedControls) return;
  const now = Date.now();
  if (now - lastSubmitTime < 30000) {
    submitScoreBtn.textContent = 'Wait 30s';
    setTimeout(() => { submitScoreBtn.textContent = 'Submit'; }, 2000);
    return;
  }
  const name = nameInput.value.trim().toUpperCase().slice(0, 3);
  if (!name) return;
  submitScoreBtn.disabled = true;
  submitScoreBtn.textContent = '...';
  const { error } = await sb.from('leaderboard').insert({
    name,
    score,
    theme: currentTheme,
    control_method: runControlMethod || controlMode,
    game_mode: runGameMode
  });
  if (error) {
    console.error('Submit failed:', error);
    submitScoreBtn.textContent = 'Error';
    setTimeout(() => { submitScoreBtn.textContent = 'Submit'; submitScoreBtn.disabled = false; }, 2000);
    return;
  }
  lastSubmitTime = now;
  submittedThisRound = true;
  submitScoreBtn.textContent = '✓ Sent!';
  namePrompt.style.display = 'none';
  // Refresh leaderboard if open
  if (leaderboardOverlay.classList.contains('visible')) loadLeaderboard();

const LB_PAGE_SIZE = 10;
const lbState = { gameMode: 'classic', control: 'all', theme: 'all', page: 0, total: 0, requestId: 0 };

function buildFilterGroup(container, values, stateKey, labelFor) {
  container.innerHTML = '';
  values.forEach(value => {
    const btn = document.createElement('button');
    const active = value === lbState[stateKey];
    btn.className = 'lb-filter' + (active ? ' active' : '');
    btn.textContent = labelFor(value);
    btn.type = 'button';
    btn.setAttribute('aria-pressed', String(active));
    btn.addEventListener('click', () => {
      if (lbState[stateKey] === value) return;
      lbState[stateKey] = value;
      lbState.page = 0;
      container.querySelectorAll('.lb-filter').forEach(b => {
        const selected = b === btn;
        b.classList.toggle('active', selected);
        b.setAttribute('aria-pressed', String(selected));
      });
      loadLeaderboard();
    });
    container.appendChild(btn);
  });
}

function buildFilters() {
  buildFilterGroup(
    lbGameModeFilters,
    ['classic', 'sprint'],
    'gameMode',
    value => value === 'sprint' ? 'Sprint 60' : 'Classic'
  );
  buildFilterGroup(
    lbControlFilters,
    ['all', 'dpad', 'turn', 'keyboard'],
    'control',
    value => value === 'all' ? 'All' : CONTROL_LABELS[value]
  );
  buildFilterGroup(
    lbThemeFilters,
    ['all', ...Object.keys(THEMES)],
    'theme',
    value => value === 'all' ? 'All' : value.charAt(0).toUpperCase() + value.slice(1)
  );
}

function updatePagination() {
  const pageCount = Math.max(1, Math.ceil(lbState.total / LB_PAGE_SIZE));
  lbPageInfo.textContent = `Page ${lbState.page + 1} of ${pageCount}`;
  lbPrev.disabled = lbState.page === 0;
  lbNext.disabled = lbState.page + 1 >= pageCount;
  lbPagination.style.display = lbState.total > 0 ? 'flex' : 'none';
}

async function loadLeaderboard() {
  if (!sb) {
    lbLoading.style.display = 'none';
    lbTable.style.display = 'none';
    lbPagination.style.display = 'none';
    lbEmpty.style.display = 'block';
    lbEmpty.textContent = 'Leaderboard unavailable';
    return;
  }
  const requestId = ++lbState.requestId;
  lbLoading.style.display = 'block';
  lbEmpty.style.display = 'none';
  lbTable.style.display = 'none';
  lbPagination.style.display = 'none';
  const from = lbState.page * LB_PAGE_SIZE;
  const to = from + LB_PAGE_SIZE - 1;
  let query = sb.from('leaderboard')
    .select('name, score, theme, control_method, game_mode, created_at', { count: 'exact' })
    .order('score', { ascending: false })
    .order('created_at', { ascending: true })
    .range(from, to);
  query = query.eq('game_mode', lbState.gameMode);
  if (lbState.control !== 'all') query = query.eq('control_method', lbState.control);
  if (lbState.theme !== 'all') query = query.eq('theme', lbState.theme);
  const { data, error, count } = await query;
  if (requestId !== lbState.requestId) return;
  lbLoading.style.display = 'none';
  if (error || !data || data.length === 0) {
    lbEmpty.style.display = 'block';
    lbEmpty.textContent = error
      ? (error.code === '42703' ? 'Leaderboard update required' : 'Failed to load')
      : 'No scores yet. Be the first!';
    lbState.total = error ? 0 : (count || 0);
    updatePagination();
    return;
  }
  lbState.total = count ?? data.length;
  lbTable.style.display = 'table';
  lbBody.innerHTML = '';
  data.forEach((row, i) => {
    const rank = from + i + 1;
    const tr = document.createElement('tr');
    if (rank === 1) tr.className = 'top1';
    else if (rank === 2) tr.className = 'top2';
    else if (rank === 3) tr.className = 'top3';
    const method = CONTROL_LABELS[row.control_method] || CONTROL_LABELS.legacy;
    tr.innerHTML = `<td class="lb-rank">${rank}</td><td>${escHtml(row.name)}<span class="lb-method-tag">${method}</span></td><td class="lb-theme-col">${escHtml(row.theme)}</td><td class="lb-score">${row.score}</td>`;
    lbBody.appendChild(tr);
  });
  updatePagination();
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showLeaderboard() {
  lbState.gameMode = gameMode;
  lbState.control = 'all';
  lbState.theme = 'all';
  lbState.page = 0;
  buildFilters();
  leaderboardOverlay.classList.add('visible');
  loadLeaderboard();
}

function hideLeaderboard() {
  leaderboardOverlay.classList.remove('visible');
}

lbBtn.addEventListener('click', showLeaderboard);
lbBack.addEventListener('click', hideLeaderboard);
lbPrev.addEventListener('click', () => {
  if (lbState.page === 0) return;
  lbState.page--;
  loadLeaderboard();
});
lbNext.addEventListener('click', () => {
  if ((lbState.page + 1) * LB_PAGE_SIZE >= lbState.total) return;
  lbState.page++;
  loadLeaderboard();
});
